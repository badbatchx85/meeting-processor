<div id="steps" class="card p-5 space-y-4">

  {% if flash %}
    <div class="px-3 py-2 rounded text-sm
      {% if flash.type == 'ok' %}bg-ok/15 text-ok border border-ok/30
      {% else %}bg-err/15 text-err border border-err/30{% endif %}">
      {{ flash.msg }}
    </div>
  {% endif %}

  <p class="text-xs text-mute">
    Escolha o que rodar em cada reunião. <strong>Áudio e transcrição rodam sempre.</strong>
    Nota, Kanban e Wiki dependem do resumo — se o resumo estiver desligado, eles são ignorados.
  </p>

  <form hx-post="/actions/steps" hx-target="#steps" hx-swap="outerHTML" class="space-y-3">

    <label class="flex items-center gap-2 opacity-70">
      <input type="checkbox" checked disabled />
      <span>Transcrição <span class="text-xs text-mute">(sempre ativa)</span></span>
    </label>

    <label class="flex items-center gap-2">
      <input type="checkbox" name="summary" value="1" {% if config.enable_summary %}checked{% endif %} />
      <span>Resumo (LLM) <span class="text-xs text-mute">— participantes, tópicos e tarefas</span></span>
    </label>

    <label class="flex items-center gap-2 pl-6">
      <input type="checkbox" name="note" value="1" {% if config.enable_note %}checked{% endif %} />
      <span>Nota no Obsidian <span class="text-xs text-mute">— precisa do resumo</span></span>
    </label>

    <label class="flex items-center gap-2 pl-6">
      <input type="checkbox" name="kanban" value="1" {% if config.enable_kanban %}checked{% endif %} />
      <span>Kanban <span class="text-xs text-mute">— precisa do resumo</span></span>
    </label>

    <label class="flex items-center gap-2 pl-6">
      <input type="checkbox" name="wiki" value="1" {% if config.enable_wiki %}checked{% endif %} />
      <span>Integração Wiki <span class="text-xs text-mute">— precisa do resumo</span></span>
    </label>

    <div class="pt-1">
      <button type="submit" class="btn btn-ok">Salvar etapas</button>
    </div>
  </form>
</div>
