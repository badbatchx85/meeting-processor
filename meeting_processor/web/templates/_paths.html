<div id="paths" class="card p-5 space-y-4 text-sm">

  {% if flash %}
    <div class="px-3 py-2 rounded text-sm
      {% if flash.type == 'ok' %}bg-ok/15 text-ok border border-ok/30
      {% else %}bg-err/15 text-err border border-err/30{% endif %}">
      {{ flash.msg }}
    </div>
  {% endif %}

  <!-- Pasta monitorada (editável) -->
  <form hx-post="/actions/watch-dir" hx-target="#paths" hx-swap="outerHTML">
    <label class="text-mute text-xs" for="watch_dir">Pasta monitorada (OBS)</label>
    <div class="flex flex-wrap gap-2 mt-1">
      <input
        type="text"
        id="watch_dir"
        name="watch_dir"
        value="{{ config.watch_dir }}"
        class="bg-bg border border-line rounded px-2 py-1 font-mono text-sm flex-1 min-w-[16rem]"
        placeholder="ex.: C:\Users\voce\Videos\OBS  ou  ~/Videos/OBS"
      />
      <button type="submit" class="btn btn-ok">Salvar</button>
    </div>
    <p class="text-xs text-mute mt-1.5">
      Onde o OBS salva as gravações. Aceita <span class="font-mono">~</span> para a home.
      A escolha é persistida em <span class="font-mono">.env</span>; se o watcher estiver
      ativo, ele reinicia para aplicar.
    </p>
  </form>

  <!-- Demais caminhos (somente leitura) -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-1">
    <div>
      <div class="text-mute text-xs">Vault</div>
      <div class="font-mono text-sm break-all mt-1">{{ config.vault_dir }}</div>
    </div>
    <div>
      <div class="text-mute text-xs">Temp</div>
      <div class="font-mono text-sm break-all mt-1">{{ config.temp_dir }}</div>
    </div>
  </div>
</div>
