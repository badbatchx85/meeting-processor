# Meeting Processor - Configuração
# ================================

# Caminhos
# watch_dir: pasta onde o OBS salva as gravações.
#   - Deixe em branco para detectar automaticamente ~/Videos/OBS (qualquer SO).
#   - Pode ser definido pela interface web (Configuração) ou pela env MEETING_WATCH_DIR.
#   - Aceita "~" para a home. Ex.: "~/Videos/OBS" ou "D:/Gravacoes".
watch_dir: ""
vault_dir: "./vault"

# Monitoramento de arquivos
watch_extensions:
  - ".mkv"
  - ".mp4"
  - ".webm"
file_stable_seconds: 10

# Whisper (transcrição)
# whisper_backend:
#   "auto"   -> usa whisper.cpp se encontrado, senão openai-whisper (pip). Padrão.
#   "openai" -> openai-whisper puro Python; baixa o modelo sozinho (mais simples)
#   "cpp"    -> força whisper.cpp (mais rápido com GPU; requer binário + modelo .bin)
whisper_backend: "auto"
whisper_model: "large"
whisper_language: "pt"
whisper_device: "auto"
whisper_initial_prompt: "Transcrição de reunião em português brasileiro."

# ----------------------------------------------------------
# Provedor de LLM (resumo da reunião)
# ----------------------------------------------------------
# Valores: "anthropic" (Claude API) ou "local" (Ollama)
# Pode ser sobrescrito por env var: MEETING_LLM_PROVIDER
llm_provider: "anthropic"

# Claude API
anthropic_model: "claude-sonnet-4-20250514"

# Ollama (LLM local) — usado quando llm_provider == "local"
# Requer Ollama instalado e o modelo baixado:
#   ollama pull qwen2.5:14b
# Veja docs/llm-local.md
ollama_base_url: "http://localhost:11434"
ollama_model: "qwen2.5:14b"
ollama_temperature: 0.2
ollama_num_ctx: 16384
ollama_request_timeout: 600.0

# Comum a todos os provedores
summary_chunk_minutes: 5
max_tokens_summary: 4096

# Nota de reunião
default_tags:
  - meeting
  - transcription
  - source
note_status: "mature"

# Kanban
kanban_file: "wiki/kanban-reunioes.md"
kanban_columns:
  todo: "A Fazer"
  in_progress: "Em Progresso"
  done: "Concluído"

# ----------------------------------------------------------
# Etapas do pipeline (áudio + transcrição rodam sempre)
# ----------------------------------------------------------
# Desligue o resumo para o modo "só transcrição".
# Nota/Kanban/Wiki dependem do resumo. Também editável pela
# interface web (Configuração > Etapas do processamento).
enable_summary: true
enable_note: true
enable_kanban: true
enable_wiki: true

# Processamento
temp_dir: ".tmp"
cleanup_temp: true
log_level: "INFO"
